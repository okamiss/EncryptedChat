services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: encrypted_chat
    ports:
      - "${POSTGRES_HOST_PORT:-35432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d encrypted_chat"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/encrypted_chat?schema=public
      JWT_SECRET: ${JWT_SECRET:-dev-change-me-at-least-32-characters}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 3000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:38081,http://127.0.0.1:38081}
      UPLOAD_DIR: /app/apps/api/uploads
    ports:
      - "${API_HOST_PORT:-38080}:3000"
    volumes:
      - api-uploads:/app/apps/api/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_SOCKET_URL: /chat
    ports:
      - "${WEB_HOST_PORT:-38081}:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres-data:
  api-uploads:
